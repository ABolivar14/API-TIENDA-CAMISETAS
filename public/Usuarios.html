<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Usuarios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="toggleTheme" class="modo-oscuro-toggle">🌙 Cambiar Tema</button>
  <div class="container">
    <h1>Usuarios</h1>
    

<input type="text" id="buscador" placeholder="Buscar por nombre o email..." class="form-control" />
<p id="contadorUsuarios">Usuarios cargados: 0</p>
<div id="loader">Cargando usuarios...</div>

    <ul id="userList" class="user-list"></ul>

    <h2>Agregar Usuario</h2>
    <form id="userForm" class="form">
      <input name="nombre" minlength="3" placeholder="Nombre" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="contraseña" type="password" placeholder="Contraseña" required maxlength="12">
      <input name="saldo" type="number" step="0.01" placeholder="Saldo" required>
      <select name="estado" required>
        <option value="">--Estado--</option>
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>
      <button type="submit">Guardar</button>
    </form>
  </div>
<div id="modalOverlay" class="modal-overlay"></div>

  <div id="editModal" class="modal">
    <button class="cerrar-modal" onclick="cerrarModal()">❌</button>
    <h3>Editar Usuario</h3>
    <form id="editForm" class="form">
      <input type="hidden" name="id" id="editId">
      <input type="text" name="nombre" id="editNombre" placeholder="Nombre" required minlength="3">
      <input type="email" name="email" id="editEmail" placeholder="Email" required>
      <input type="number" name="saldo" id="editSaldo" placeholder="Saldo" step="0.01">
      <select name="estado" id="editEstado" required>
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>
      <button type="submit">Guardar cambios</button>
      <button type="button" onclick="cerrarModal()">Cancelar</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
